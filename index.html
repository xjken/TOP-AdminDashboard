<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Admin Dashboard</title>
</head>
<body>
    <div class="sidebar">
        <div class="title">
            <img src="icons/view-dashboard.svg" alt="">
            Dashboard
        </div>
        <div class="items">
            <ul>
                <li> <img src="icons/home.svg" alt="">Home</li>
                <li> <img src="icons/card-account-details-outline.svg" alt="">Profile</li>
                <li> <img src="icons/message-reply.svg" alt="">Messages</li>
                <li> <img src="icons/history.svg" alt="">History</li>
                <li> <img src="icons/clipboard-check-multiple-outline.svg" alt="">Tasks</li>
                <li> <img src="icons/account-group.svg" alt="">Community</li>
            </ul>
        </div>
        <div class="items">
            <ul>
                <li> <img src="icons/cog.svg" alt="">Settings</li>
                <li> <img src="icons/help.svg" alt="">Support</li>
                <li> <img src="icons/shield-lock.svg" alt="">Privacy</li>
            </ul>
        </div>
    </div>
    <div class="header">
        <div class="header-row-top">
            <div class="search-section">
                <img class="icon" src="icons/magnify.svg" alt="">
                <input class="search-bar" type="search">
            </div>
            <div class="user-section">
                <img class="icon" src="icons/bell-ring-outline.svg" alt="">
                <img class="small-profile" src="https://avatars.githubusercontent.com/u/63294438?v=4" alt="">
                <p>Kenu Mitchie</p>
            </div>
        </div>
        <div class="header-row-bottow">
            <img class="big-profile" src="https://avatars.githubusercontent.com/u/63294438?v=4" alt="">
            <p>Hi, there <br> Kenu Mitchie (@kenumit)</p>
            <button>new</button>
            <button>upload</button>
            <button>share</button>
        </div>
    </div>
    <div class="main-content"></div>
</body>
</html>
